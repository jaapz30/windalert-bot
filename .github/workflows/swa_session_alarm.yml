name: SWA Telegram één actieve spot

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Optioneel Telegramcommando, bijvoorbeeld /spot makkum, /test of /stop'
        required: false
        default: '/test'
        type: string

permissions:
  contents: write

concurrency:
  group: swa-telegram-single-active-spot
  cancel-in-progress: false

jobs:
  check-session-alarm:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Telegramcommando's en actieve spot controleren
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MANUAL_COMMAND: ${{ github.event.inputs.command }}
        run: python swa_session_alarm.py

      - name: Alarmstatus terugschrijven
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- swa_session_alarm_status.json; then
            echo "Geen statuswijziging om op te slaan."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add swa_session_alarm_status.json
          git commit -m "SWA actieve Telegram-spot bijwerken"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
